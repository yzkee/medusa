name: Triage Issue (Reusable)

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: string
    secrets:
      MEDUSA_APP_ID:
        required: true
      MEDUSA_APP_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      discussions: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get issue info
        id: issue-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_data=$(gh issue view ${{ inputs.issue_number }} --json title,author \
            --jq '{title: .title, author: .author.login}')
          {
            echo "title<<EOF"
            echo "$issue_data" | jq -r '.title'
            echo "EOF"
            echo "author=$(echo "$issue_data" | jq -r '.author')"
          } >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MEDUSA_APP_ID }}
          private-key: ${{ secrets.MEDUSA_APP_PRIVATE_KEY }}

      - name: Triage issue
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_non_write_users: "*"
          base_branch: develop
          show_full_output: true
          plugin_marketplaces: "https://github.com/medusajs/medusa-agent-skills.git"
          plugins: "medusa-dev@medusa"

          prompt: |
            ISSUE NUMBER: ${{ inputs.issue_number }}
            ISSUE TITLE: ${{ steps.issue-info.outputs.title }}
            ISSUE AUTHOR: ${{ steps.issue-info.outputs.author }}

            Note: all scripts are located in the root `scripts/` directory and should be run as `bash scripts/<script>.sh`.

            /triaging-issues ${{ inputs.issue_number }} "${{ steps.issue-info.outputs.title }}" "${{ steps.issue-info.outputs.author }}"

          claude_args: >-
            --allowedTools
            "Bash(bash scripts/get_issue.sh:*),
            Bash(bash scripts/get_comments.sh:*),
            Bash(bash scripts/get_labels.sh:*),
            Bash(bash scripts/add_comment.sh:*),
            Bash(bash scripts/labels.sh:*),
            Bash(bash scripts/close_issue.sh:*),
            Bash(bash scripts/convert_to_discussion.sh:*),
            Bash(bash scripts/search_issues.sh:*),
            Bash(gh search issues:*)"
