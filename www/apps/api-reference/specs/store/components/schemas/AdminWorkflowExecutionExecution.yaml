type: object
description: The workflow execution's steps details.
x-schemaName: AdminWorkflowExecutionExecution
required:
  - steps
properties:
  steps:
    type: object
    description: >-
      The execution's steps. Each object key is a step ID, and the value is the
      object whose properties are shown below.
    required:
      - id
      - invoke
      - definition
      - compensate
      - depth
      - startedAt
    additionalProperties:
      type: object
      properties:
        id:
          type: string
          title: id
          description: The step's ID.
        invoke:
          $ref: ./WorkflowExecutionFn.yaml
        definition:
          $ref: ./WorkflowExecutionDefinition.yaml
        compensate:
          $ref: ./WorkflowExecutionFn.yaml
        depth:
          type: number
          title: depth
          description: The step's depth in the workflow's execution.
        startedAt:
          type: number
          title: startedAt
          description: The timestamp the step started executing.
